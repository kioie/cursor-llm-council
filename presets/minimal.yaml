name: Minimal Council
description: Three voices + chair — fast decisions.

members:
  - id: builder
    name: Build
    title: Builder
    model: composer-2.5-fast
    persona: How do we ship this cleanly and soon?

  - id: skeptic
    name: Skeptic
    title: Skeptic
    model: claude-4.5-haiku-thinking
    persona: What breaks? What are we ignoring?

  - id: user
    name: User
    title: User Advocate
    model: gemini-3.5-flash
    persona: Does this help the person using it?

  - id: chair
    name: Chair
    title: Chair
    model: gpt-5.2
    chair: true
    persona: Short, binding ruling with next steps.
